<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Паркинг · Охранник</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:rgba(140,140,150,.3);border-radius:8px;}
@keyframes liveBlink{0%,100%{opacity:1;}50%{opacity:.25;}}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(26px,-32px) scale(1.08);}}

/* ── DARK (default) ── */
:root{
  --bg:#0f0f11;--bg2:#0b0b0d;
  --surface:rgba(255,255,255,0.05);
  --surface2:rgba(255,255,255,0.085);
  --border:rgba(255,255,255,0.10);
  --text:#F5F5F5;--text2:#a4a4ac;--text3:#6b6b73;
  --accent:#CB3A52;--accent2:#8B253B;
  --as:rgba(203,58,82,0.17);--al:rgba(203,58,82,0.45);
  --green:#3aa86b;--gs:rgba(58,168,107,0.15);--gl:rgba(58,168,107,0.5);
  --shadow:0 26px 64px -26px rgba(0,0,0,.78);
  --blur:20px;--radius:22px;--rsm:14px;
  --blob:.4;
}
/* ── LIGHT ── */
[data-theme="light"]{
  --bg:#F5F5F5;--bg2:#ECEAEA;
  --surface:rgba(255,255,255,0.74);
  --surface2:rgba(255,255,255,0.92);
  --border:rgba(17,17,17,0.10);
  --text:#141414;--text2:#5c5c62;--text3:#9a9aa0;
  --accent:#8B253B;--accent2:#6E1B2E;
  --as:rgba(139,37,59,0.10);--al:rgba(139,37,59,0.30);
  --green:#2c8a55;--gs:rgba(44,138,85,0.12);--gl:rgba(44,138,85,0.4);
  --shadow:0 26px 60px -28px rgba(80,20,35,.20);
  --blob:.28;
}

body{background:var(--bg);color:var(--text);transition:background .35s,color .35s;}

.blob{position:fixed;border-radius:50%;filter:blur(40px);pointer-events:none;z-index:0;}
.blob1{top:-180px;right:-120px;width:560px;height:560px;background:radial-gradient(circle,var(--accent2),transparent 68%);opacity:var(--blob);animation:floatBlob 14s ease-in-out infinite;}
.blob2{bottom:-220px;left:-140px;width:520px;height:520px;background:radial-gradient(circle,var(--accent2),transparent 70%);opacity:calc(var(--blob)*.75);animation:floatBlob 18s ease-in-out infinite reverse;}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:38px;height:38px;border-radius:11px;background:linear-gradient(140deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px -8px var(--al);flex-shrink:0;}
.logo-name{font:700 16px 'Space Grotesk',sans-serif;letter-spacing:-.01em;color:var(--text);}
.logo-name em{color:var(--accent);font-style:normal;}
.logo-sub{font:500 11px Manrope;color:var(--text3);margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hnav{display:flex;gap:3px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:13px;}
.hnav a{padding:7px 14px;border-radius:9px;font:600 12.5px Manrope;color:var(--text2);text-decoration:none;transition:.18s;white-space:nowrap;}
.hnav a.active{background:var(--accent);color:#fff;box-shadow:0 6px 16px -6px var(--al);}
.hnav a:hover:not(.active){background:var(--surface2);}
.theme-btn{width:38px;height:38px;border-radius:11px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:.18s;flex-shrink:0;}
.theme-btn:hover{background:var(--border);}

/* ── PAGE ── */
.page{position:relative;z-index:1;min-height:calc(100vh - 70px);display:flex;align-items:flex-start;justify-content:center;padding:36px 20px 48px;}
.wrap{width:100%;max-width:620px;display:flex;flex-direction:column;gap:16px;}

/* ── SECTION TITLE ── */
.sect-title{font:700 28px 'Space Grotesk',sans-serif;letter-spacing:-.02em;color:var(--text);}
.sect-sub{font:500 13.5px Manrope;color:var(--text3);margin-top:4px;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));box-shadow:var(--shadow);}
.cp{padding:22px;}

/* ── STAT CARDS ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat{padding:22px;transition:transform .25s;}
.stat:hover{transform:translateY(-3px);}
.stat-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.stat-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.stat-ico.a{background:var(--as);color:var(--accent);}
.stat-ico.g{background:var(--gs);color:var(--green);}
.stat-val{font:700 42px 'Space Grotesk',sans-serif;letter-spacing:-.02em;color:var(--text);line-height:1;}
.stat-lbl{font:500 13px Manrope;color:var(--text3);margin-top:8px;}
.stat-badge{display:inline-block;padding:4px 10px;border-radius:8px;font:600 11.5px Manrope;}
.sb-a{background:var(--as);color:var(--accent);}
.sb-g{background:var(--gs);color:var(--green);}

/* ── PLATE INPUT ── */
.plate-card{padding:20px 22px;}
.plate-label{font:600 10.5px Manrope;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
.plate-wrap-outer{display:flex;align-items:center;gap:12px;justify-content:flex-start;}
.plate-real{display:inline-flex;align-items:stretch;background:#fff;border:3px solid #222;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.25);height:62px;width:fit-content;}
.plate-left{width:38px;background:#e8e8e8;border-right:2px solid #ccc;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:5px 4px;flex-shrink:0;}
.plate-left .flag{width:26px;height:16px;border-radius:2px;overflow:hidden;display:flex;flex-direction:column;}
.flag-r{height:33.3%;background:#CC0001;}
.flag-w{height:33.4%;background:#fff;}
.flag-g{height:33.3%;background:#006600;}
.plate-left .tj{font:800 11px Arial,sans-serif;color:#111;letter-spacing:.06em;margin-top:2px;}
.plate-inp{background:transparent;border:none;outline:none;font:800 30px 'Space Grotesk',sans-serif;letter-spacing:.12em;color:#111;text-transform:uppercase;padding:0 14px 0 10px;width:200px;caret-color:#CB3A52;}
.plate-inp::placeholder{color:#bbb;font-weight:600;}
.plate-clr{background:var(--surface2);border:1px solid var(--border);cursor:pointer;color:var(--text3);width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.plate-clr:hover{color:var(--text2);background:var(--border);}

/* ── ACTION BUTTONS ── */
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-action{border:none;cursor:pointer;border-radius:var(--rsm);font:700 15px Manrope;padding:20px 16px;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .2s;width:100%;}
.btn-action:hover{transform:translateY(-2px);}
.btn-action:active{transform:scale(.97);}
.btn-entry{background:linear-gradient(135deg,#3aa86b,#2c8a55);color:#fff;box-shadow:0 12px 28px -10px rgba(58,168,107,.5);}
.btn-exit{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 12px 28px -10px var(--al);}
.btn-action svg{flex-shrink:0;}

/* ── LOG ── */
.log-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:0;}
.log-title{font:600 10.5px Manrope;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);}
.log-refresh{width:30px;height:30px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:.18s;}
.log-refresh:hover{color:var(--text2);}
.log-sep{height:1px;background:var(--border);margin:14px 0 4px;}
.log-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.li-entry{background:var(--gs);}
.li-exit{background:var(--as);}
.li-deny{background:rgba(203,58,82,.2);}
.log-info{flex:1;min-width:0;}
.log-type{font:600 13.5px Manrope;color:var(--text);}
.log-meta{font:500 11.5px Manrope;color:var(--text3);margin-top:2px;}
.log-plate{font:600 13px 'Space Grotesk',sans-serif;letter-spacing:.06em;padding:5px 11px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);white-space:nowrap;flex-shrink:0;}
.log-empty{padding:28px 0;text-align:center;font:500 13.5px Manrope;color:var(--text3);}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:14px 24px;font:600 14px Manrope;color:var(--text);backdrop-filter:blur(20px);z-index:200;transition:transform .3s cubic-bezier(.18,.89,.32,1.28),opacity .25s;opacity:0;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:var(--gl);color:var(--green);}
.toast.err{border-color:var(--al);color:var(--accent);}

/* ── MOBILE ── */
@media(max-width:640px){
  .hdr{padding:12px 16px;}
  .hnav{display:none;}
  .page{padding:20px 14px 40px;}
  .sect-title{font-size:22px;}
  .stat-val{font-size:36px;}
  .btns{gap:10px;}
  .btn-action{padding:18px 12px;font-size:14px;}
}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 20V5a1 1 0 0 1 1-1h6.5a5 5 0 0 1 0 10H8" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div>
      <div class="logo-name">Паркинг<em>.</em></div>
      <div class="logo-sub">Панель охранника</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="hnav">
      <a href="/admin">Админка</a>
      <a href="/guard" class="active">Охранник</a>
      <a href="/">Терминал</a>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" title="Сменить тему">
      <svg id="themeIco" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</div>

<!-- PAGE -->
<div class="page">
  <div class="wrap">

    <!-- TITLE -->
    <div>
      <div class="sect-title">Ручное управление</div>
      <div class="sect-sub" id="dateLabel">—</div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="card stat">
        <div class="stat-row">
          <div class="stat-ico g">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 16l1.2-4.2A2.5 2.5 0 0 1 8.6 10h6.8a2.5 2.5 0 0 1 2.4 1.8L19 16M5 16h14v3h-2v-1H7v1H5v-3z" stroke-linejoin="round"/><circle cx="8" cy="17.5" r=".6"/><circle cx="16" cy="17.5" r=".6"/></svg>
          </div>
          <span class="stat-badge sb-g" id="badgeFree">—</span>
        </div>
        <div class="stat-val" id="valFree">—</div>
        <div class="stat-lbl">Свободных мест</div>
      </div>
      <div class="card stat">
        <div class="stat-row">
          <div class="stat-ico a">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M5.5 5.5a9 9 0 0 0 0 13M18.5 5.5a9 9 0 0 1 0 13" stroke-linecap="round"/></svg>
          </div>
          <span class="stat-badge sb-a" id="badgeInside">—</span>
        </div>
        <div class="stat-val" id="valInside">—</div>
        <div class="stat-lbl">Машин внутри</div>
      </div>
    </div>

    <!-- PLATE INPUT -->
    <div class="card plate-card">
      <div class="plate-label">Номер автомобиля</div>
      <div class="plate-wrap-outer">
        <div class="plate-real">
          <div class="plate-left">
            <div class="flag">
              <div class="flag-r"></div>
              <div class="flag-w"></div>
              <div class="flag-g"></div>
            </div>
            <div class="tj">TJ</div>
          </div>
          <input class="plate-inp" id="plateIn" placeholder="4555FF02" maxlength="10" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <button class="plate-clr" onclick="clearPlate()" title="Очистить">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z" stroke-linejoin="round"/><path d="M15 9l-6 6M9 9l6 6" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- BUTTONS -->
    <div class="btns">
      <button class="btn-action btn-entry" onclick="openGate('entry')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Открыть въезд
      </button>
      <button class="btn-action btn-exit" onclick="openGate('exit')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12l7 7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Открыть выезд
      </button>
    </div>

    <!-- LOG -->
    <div class="card cp">
      <div class="log-hdr">
        <span class="log-title">Журнал операций</span>
        <button class="log-refresh" onclick="loadStats()" title="Обновить">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3v5h5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="log-sep"></div>
      <div id="logList"><div class="log-empty">Нет операций</div></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CAP = 60;
let log = [];
let isDark = true;

// Date label
const DAYS = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const now = new Date();
document.getElementById('dateLabel').textContent = DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
  const ico = document.getElementById('themeIco');
  if (isDark) {
    ico.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    ico.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
}

function clearPlate() {
  document.getElementById('plateIn').value = '';
  document.getElementById('plateIn').focus();
}

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

async function loadStats() {
  try {
    const s = await (await fetch('/api/admin/stats')).json();
    const free = Math.max(0, CAP - s.currently_inside);
    document.getElementById('valFree').textContent = free;
    document.getElementById('valInside').textContent = s.currently_inside;
    document.getElementById('badgeFree').textContent = Math.round(free / CAP * 100) + '%';
    document.getElementById('badgeInside').textContent = s.currently_inside + ' авт.';
  } catch(e) {}
}

function renderLog() {
  const el = document.getElementById('logList');
  if (!log.length) {
    el.innerHTML = '<div class="log-empty">Нет операций</div>';
    return;
  }
  el.innerHTML = log.slice(0, 10).map(g => {
    const ico = g.type === 'entry'
      ? `<div class="log-ico li-entry"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.2"><path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
      : g.type === 'exit'
      ? `<div class="log-ico li-exit"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2"><path d="M12 5v14M5 12l7 7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
      : `<div class="log-ico li-deny"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2"><circle cx="12" cy="12" r="8.5"/><path d="M6 6l12 12" stroke-linecap="round"/></svg></div>`;
    const label = g.type === 'entry' ? 'Въезд — наличные' : g.type === 'exit' ? 'Выезд — наличные' : 'Отказ въезда';
    return `<div class="log-item">
      ${ico}
      <div class="log-info">
        <div class="log-type">${label}</div>
        <div class="log-meta">${g.time}</div>
      </div>
      <span class="log-plate">${g.plate}</span>
    </div>`;
  }).join('');
}

async function openGate(dir) {
  const plate = document.getElementById('plateIn').value.trim().toUpperCase() || 'MANUAL';
  const url = dir === 'entry' ? '/api/guard/open-entry' : '/api/guard/open-exit';
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plate })
    });
    const d = await r.json();
    if (d.success) {
      const time = new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
      log.unshift({ plate, time, type: dir });
      renderLog();
      loadStats();
      clearPlate();
      showToast(dir === 'entry' ? '↑ Въезд открыт' : '↓ Выезд открыт', 'ok');
    }
  } catch(e) {
    showToast('Ошибка связи', 'err');
  }
}

loadStats();
setInterval(loadStats, 20000);
</script>
</body>
</html>
