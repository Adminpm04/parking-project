<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Паркинг · Терминал</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:#0f0f11;color:#F5F5F5;font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;}
@keyframes liveBlink{0%,100%{opacity:1;}50%{opacity:.25;}}
@keyframes pulseRing{0%{transform:scale(.7);opacity:.6;}100%{transform:scale(2.4);opacity:0;}}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(26px,-32px) scale(1.08);}}
@keyframes popIn{0%{transform:scale(.4);opacity:0;}70%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
@keyframes qrGlow{0%,100%{box-shadow:0 0 0 1px rgba(203,58,82,.45),0 30px 60px -22px rgba(0,0,0,.5);}50%{box-shadow:0 0 0 1px rgba(203,58,82,.8),0 26px 80px -14px rgba(203,58,82,.3);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
:root{
  --bg:#0f0f11;--surface:rgba(255,255,255,0.05);--surface-2:rgba(255,255,255,0.085);
  --border:rgba(255,255,255,0.10);--text:#F5F5F5;--text-2:#a4a4ac;--text-3:#6b6b73;
  --accent:#CB3A52;--accent-2:#8B253B;--accent-soft:rgba(203,58,82,0.17);--accent-line:rgba(203,58,82,0.45);
  --shadow:0 26px 64px -26px rgba(0,0,0,.78);
}
.blob{position:fixed;border-radius:50%;filter:blur(40px);pointer-events:none;z-index:0;}
.blob-1{top:-180px;right:-120px;width:560px;height:560px;background:radial-gradient(circle,var(--accent-2),transparent 68%);opacity:.4;animation:floatBlob 14s ease-in-out infinite;}
.blob-2{bottom:-220px;left:-140px;width:520px;height:520px;background:radial-gradient(circle,var(--accent-2),transparent 70%);opacity:.3;animation:floatBlob 18s ease-in-out infinite reverse;}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:46px 46px;opacity:.5;pointer-events:none;z-index:0;}
.screen{position:relative;z-index:1;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}

/* IDLE */
#stateIdle{text-align:center;animation:fadeIn .5s ease;}
.pulse-wrap{position:relative;width:130px;height:130px;margin:0 auto 34px;}
.pulse-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--accent-line);}
.pulse-ring:nth-child(1){animation:pulseRing 2.4s ease-out infinite;}
.pulse-ring:nth-child(2){animation:pulseRing 2.4s ease-out infinite 1.2s;}
.pulse-core{position:absolute;inset:30px;border-radius:50%;background:linear-gradient(140deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;box-shadow:0 12px 30px -8px var(--accent-line);}
.idle-title{font:700 72px 'Space Grotesk',sans-serif;letter-spacing:.04em;color:var(--text);}
.idle-sub{font:500 24px Manrope;color:var(--text-2);margin-top:16px;}
.idle-hint{font:500 16px Manrope;color:var(--text-3);margin-top:36px;}

/* PAYMENT */
#statePay{display:flex;align-items:center;gap:64px;animation:fadeIn .5s ease;}
.pay-left{text-align:left;}
.pay-label{font:600 14px Manrope;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px;}
.pay-amount{font:700 96px 'Space Grotesk',sans-serif;letter-spacing:-.02em;color:var(--accent);line-height:.9;}
.pay-amount span{font-size:36px;color:var(--text-2);}
.pay-plate{display:inline-block;font:700 36px 'Space Grotesk',sans-serif;letter-spacing:.12em;color:var(--text);padding:14px 30px;border-radius:16px;border:1px solid var(--border);background:var(--surface);margin:32px 0 26px;}
.pay-inst{font:500 18px Manrope;color:var(--text-2);line-height:1.8;max-width:320px;}
.pay-inst strong{color:var(--accent);font-weight:700;}
.qr-wrap{padding:24px;border-radius:24px;background:#fff;animation:qrGlow 2.6s ease-in-out infinite;}

/* SUCCESS */
#stateSuccess{text-align:center;animation:fadeIn .5s ease;}
.success-circle{width:150px;height:150px;margin:0 auto 30px;border-radius:50%;background:rgba(70,181,118,.16);display:flex;align-items:center;justify-content:center;animation:popIn .5s cubic-bezier(.18,.89,.32,1.28);}
.success-title{font:700 64px 'Space Grotesk',sans-serif;color:#46b576;}
.success-plate{display:inline-block;font:700 28px 'Space Grotesk',sans-serif;letter-spacing:.1em;color:var(--text);margin-top:16px;}
.success-hint{font:600 22px Manrope;color:var(--text-2);margin-top:30px;animation:liveBlink 1s infinite;}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="grid-bg"></div>

<div class="screen">

  <!-- IDLE STATE -->
  <div id="stateIdle">
    <div class="pulse-wrap">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-core">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none"><path d="M6 20V5a1 1 0 0 1 1-1h6.5a5 5 0 0 1 0 10H8" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div class="idle-title">ПАРКОВКА</div>
    <div class="idle-sub">Подъезжайте к шлагбауму</div>
    <div class="idle-hint">Ожидание автомобиля…</div>
  </div>

  <!-- PAYMENT STATE -->
  <div id="statePay" style="display:none;">
    <div class="pay-left">
      <div class="pay-label">Сумма к оплате</div>
      <div class="pay-amount" id="payAmount">5 <span>сомони</span></div>
      <div class="pay-plate" id="payPlate">— — —</div>
      <div class="pay-inst">Откройте <strong>Alif Mobi</strong> → сканируйте QR → нажмите <strong>Оплатить</strong></div>
    </div>
    <div class="qr-wrap">
      <img id="qrImg" src="" width="280" height="280" alt="QR">
    </div>
  </div>

  <!-- SUCCESS STATE -->
  <div id="stateSuccess" style="display:none;">
    <div class="success-circle">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#46b576" stroke-width="2.6"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="success-title">Оплачено!</div>
    <div class="success-plate" id="successPlate"></div>
    <div class="success-hint">Шлагбаум открывается…</div>
  </div>

</div>

<script>
let currentState = 'idle';
let idleTimer = null;

function setState(name) {
  currentState = name;
  document.getElementById('stateIdle').style.display = name === 'idle' ? '' : 'none';
  document.getElementById('statePay').style.display = name === 'pay' ? 'flex' : 'none';
  document.getElementById('stateSuccess').style.display = name === 'success' ? '' : 'none';
  if (idleTimer) clearTimeout(idleTimer);
  if (name === 'success') {
    idleTimer = setTimeout(() => setState('idle'), 6000);
  }
}

function showPayment(data) {
  document.getElementById('payAmount').innerHTML = data.amount + ' <span>сомони</span>';
  document.getElementById('payPlate').textContent = data.plate;
  document.getElementById('qrImg').src = '/api/qr/' + data.invoice_id;
  setState('pay');
}

function showSuccess(data) {
  document.getElementById('successPlate').textContent = data.plate || '';
  setState('success');
}

// WebSocket
function connect() {
  const ws = new WebSocket('ws://' + location.host + '/ws/exit-terminal');
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'show_payment') showPayment(d);
      if (d.type === 'payment_success') showSuccess(d);
    } catch(err) {}
  };
  ws.onclose = () => setTimeout(connect, 2000);
}
connect();
</script>
</body>
</html>
